name: Release Dashboard

on:
  schedule:
    - cron: '17 6 * * *'   # daily at 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-dashboard:
    name: Refresh README dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update dashboard block in README.md
        env:
          GH_TOKEN: ${{ secrets.DASHBOARD_PAT || secrets.GITHUB_TOKEN }}
        run: bash scripts/dashboard-update.sh

      - name: Commit + push if changed
        run: |
          if [ -n "$(git status --porcelain README.md)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore(dashboard): refresh release status"
            git push
          else
            echo "Dashboard unchanged."
          fi
